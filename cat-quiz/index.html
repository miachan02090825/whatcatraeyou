<style>
/* ============================================
   DESIGN SYSTEM — Cat Quiz Theme
   ============================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg-deep:#1A1625;
  --bg-mid:#2D1B4E;
  --bg-glow:#3D2466;
  --primary:#F4A261;
  --primary-light:#FFD4A3;
  --accent:#E76F51;
  --accent-soft:#FFDDD2;
  --text-main:#F8F0E3;
  --text-sub:#B8A9C9;
  --text-dim:#7A6B8A;
  --card-bg:rgba(255,255,255,0.06);
  --card-border:rgba(255,255,255,0.1);
  --card-hover:rgba(255,255,255,0.12);
  --success:#6FCF97;
  --shadow-glow:0 0 60px rgba(244,162,97,0.15);
  --radius:16px;
  --radius-lg:24px;
  --radius-pill:999px;
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);
  --font-zh:'Noto Sans TC',sans-serif;
  --font-num:'Outfit',sans-serif;
}

html{scroll-behavior:smooth}

body{
  font-family:var(--font-zh);
  background:var(--bg-deep);
  color:var(--text-main);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* Animated background */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(45,27,78,0.8) 0%,transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 100%,rgba(231,111,81,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 10% 80%,rgba(244,162,97,0.08) 0%,transparent 50%);
  z-index:0;
  pointer-events:none;
}

/* Floating particles */
.particles{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.particle{
  position:absolute;
  width:4px;height:4px;
  background:var(--primary);
  border-radius:50%;
  opacity:0;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  20%{opacity:0.6}
  80%{opacity:0.3}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* ============================================
   LAYOUT
   ============================================ */
.app{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
}

.container{
  width:100%;max-width:560px;
  position:relative;
}

/* ============================================
   LANGUAGE TOGGLE
   ============================================ */
.lang-toggle{
  position:fixed;top:20px;right:20px;z-index:100;
  display:flex;gap:4px;
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  border:1px solid var(--card-border);
  border-radius:var(--radius-pill);
  padding:4px;
}
.lang-btn{
  border:none;background:transparent;
  color:var(--text-sub);
  font-family:var(--font-zh);
  font-size:13px;font-weight:500;
  padding:6px 14px;
  border-radius:var(--radius-pill);
  cursor:pointer;
  transition:var(--transition);
}
.lang-btn.active{
  background:var(--primary);
  color:var(--bg-deep);
  font-weight:700;
}
.lang-btn:hover:not(.active){color:var(--text-main)}

/* ============================================
   PAGES (Sections)
   ============================================ */
.page{
  display:none;
  animation:pageIn 0.6s ease-out forwards;
}
.page.active{display:block}

@keyframes pageIn{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

/* ============================================
   LANDING PAGE
   ============================================ */
.landing{text-align:center}

.landing-icon{
  font-size:80px;
  margin-bottom:8px;
  animation:bounce 2s ease-in-out infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

.landing h1{
  font-size:clamp(28px,6vw,42px);
  font-weight:900;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.3;
  margin-bottom:12px;
}

.landing-subtitle{
  font-size:clamp(15px,3.5vw,18px);
  color:var(--text-sub);
  margin-bottom:36px;
  line-height:1.7;
}

.landing-card{
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  border:1px solid var(--card-border);
  border-radius:var(--radius-lg);
  padding:32px 24px;
  margin-bottom:32px;
}

.cat-preview{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-bottom:24px;
}

.cat-preview-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;
}

.cat-preview-item img{
  width:64px;height:64px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--card-border);
  transition:var(--transition);
}

.cat-preview-item span{
  font-size:11px;
  color:var(--text-dim);
  font-weight:500;
}

.landing-info{
  font-size:14px;
  color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;gap:6px;
}

.landing-info svg{width:16px;height:16px;stroke:var(--text-dim)}

.btn-start{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:var(--bg-deep);
  font-family:var(--font-zh);
  font-size:18px;font-weight:700;
  padding:16px 48px;
  border:none;
  border-radius:var(--radius-pill);
  cursor:pointer;
  transition:var(--transition);
  box-shadow:0 4px 24px rgba(244,162,97,0.3);
  position:relative;
  overflow:hidden;
}
.btn-start::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.2) 50%,transparent 70%);
  transform:translateX(-100%);
  transition:0.6s;
}
.btn-start:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(244,162,97,0.45);
}
.btn-start:hover::before{transform:translateX(100%)}
.btn-start:active{transform:translateY(0)}

.btn-start svg{width:20px;height:20px;fill:var(--bg-deep)}

/* ============================================
   QUIZ PAGE
   ============================================ */
.quiz-header{margin-bottom:24px}

.progress-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}

.progress-label{
  font-size:14px;font-weight:600;color:var(--text-sub);
  font-family:var(--font-num);
}

.progress-bar{
  width:100%;height:6px;
  background:rgba(255,255,255,0.08);
  border-radius:var(--radius-pill);
  overflow:hidden;
}

.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--primary),var(--accent));
  border-radius:var(--radius-pill);
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
  position:relative;
}
.progress-fill::after{
  content:'';
  position:absolute;right:0;top:0;
  width:20px;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4));
  border-radius:var(--radius-pill);
}

.question-card{
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  border:1px solid var(--card-border);
  border-radius:var(--radius-lg);
  padding:28px 24px;
  animation:cardIn 0.4s ease-out;
}

@keyframes cardIn{
  from{opacity:0;transform:translateX(40px)}
  to{opacity:1;transform:translateX(0)}
}

.question-number{
  display:inline-flex;align-items:center;justify-content:center;
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:var(--bg-deep);
  font-family:var(--font-num);
  font-size:16px;font-weight:700;
  border-radius:50%;
  margin-bottom:16px;
}

.question-text{
  font-size:clamp(17px,4vw,20px);
  font-weight:700;
  line-height:1.6;
  margin-bottom:24px;
  color:var(--text-main);
}

.options{display:flex;flex-direction:column;gap:12px}

.option-btn{
  display:flex;align-items:center;gap:14px;
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  padding:16px 18px;
  cursor:pointer;
  transition:var(--transition);
  text-align:left;
  font-family:var(--font-zh);
  font-size:15px;
  color:var(--text-main);
  line-height:1.5;
  position:relative;
  overflow:hidden;
}

.option-btn::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(244,162,97,0.15),rgba(231,111,81,0.1));
  opacity:0;
  transition:var(--transition);
}

.option-btn:hover{
  border-color:var(--primary);
  background:rgba(244,162,97,0.08);
  transform:translateX(4px);
}
.option-btn:hover::before{opacity:1}

.option-btn.selected{
  border-color:var(--primary);
  background:rgba(244,162,97,0.12);
  box-shadow:0 0 20px rgba(244,162,97,0.15);
}

.option-letter{
  display:flex;align-items:center;justify-content:center;
  min-width:32px;height:32px;
  background:rgba(255,255,255,0.08);
  border-radius:50%;
  font-family:var(--font-num);
  font-size:14px;font-weight:600;
  color:var(--text-sub);
  transition:var(--transition);
  position:relative;z-index:1;
}
.option-btn:hover .option-letter,
.option-btn.selected .option-letter{
  background:var(--primary);
  color:var(--bg-deep);
}

.option-text{position:relative;z-index:1}

/* Nav buttons */
.quiz-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:20px;
}

.btn-back{
  display:inline-flex;align-items:center;gap:6px;
  background:transparent;
  border:1px solid var(--card-border);
  color:var(--text-sub);
  font-family:var(--font-zh);
  font-size:14px;font-weight:500;
  padding:10px 20px;
  border-radius:var(--radius-pill);
  cursor:pointer;
  transition:var(--transition);
}
.btn-back:hover{color:var(--text-main);border-color:var(--text-sub)}
.btn-back svg{width:16px;height:16px;stroke:currentColor}
.btn-back.hidden{visibility:hidden}

/* ============================================
   RESULT PAGE
   ============================================ */
.result{text-align:center}

.result-card{
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  border:1px solid var(--card-border);
  border-radius:var(--radius-lg);
  padding:36px 24px;
  margin-bottom:24px;
  animation:resultIn 0.8s ease-out;
}

@keyframes resultIn{
  from{opacity:0;transform:scale(0.9) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.result-badge{
  display:inline-block;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:var(--bg-deep);
  font-size:13px;font-weight:700;
  padding:6px 18px;
  border-radius:var(--radius-pill);
  margin-bottom:20px;
  letter-spacing:0.5px;
}

.result-image{
  width:180px;height:180px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid var(--primary);
  margin:0 auto 20px;
  display:block;
  box-shadow:0 0 40px rgba(244,162,97,0.2);
  animation:imgPop 0.6s 0.3s ease-out both;
}

@keyframes imgPop{
  from{opacity:0;transform:scale(0.7)}
  to{opacity:1;transform:scale(1)}
}

.result-name{
  font-size:clamp(24px,5vw,32px);
  font-weight:900;
  background:linear-gradient(135deg,var(--primary),var(--accent-soft));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:4px;
}

.result-subtitle{
  font-size:15px;
  color:var(--text-sub);
  margin-bottom:20px;
  font-weight:500;
}

.result-traits{
  display:flex;flex-wrap:wrap;
  justify-content:center;gap:8px;
  margin-bottom:24px;
}

.trait-tag{
  background:rgba(244,162,97,0.12);
  color:var(--primary-light);
  font-size:13px;font-weight:600;
  padding:6px 16px;
  border-radius:var(--radius-pill);
  border:1px solid rgba(244,162,97,0.2);
}

.result-desc{
  font-size:15px;
  color:var(--text-sub);
  line-height:1.8;
  text-align:left;
  padding:0 8px;
}

/* Share */
.share-section{
  margin-bottom:24px;
}

.share-title{
  font-size:14px;
  color:var(--text-dim);
  margin-bottom:12px;
  font-weight:500;
}

.share-buttons{
  display:flex;justify-content:center;gap:12px;
  flex-wrap:wrap;
}

.btn-share{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;
  border-radius:var(--radius-pill);
  border:1px solid var(--card-border);
  background:var(--card-bg);
  backdrop-filter:blur(10px);
  color:var(--text-main);
  font-family:var(--font-zh);
  font-size:13px;font-weight:500;
  cursor:pointer;
  transition:var(--transition);
}
.btn-share:hover{
  border-color:var(--primary);
  background:rgba(244,162,97,0.1);
  transform:translateY(-2px);
}
.btn-share svg{width:16px;height:16px}
.btn-share.copied{
  border-color:var(--success);
  color:var(--success);
}

.btn-restart{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;
  border:2px solid var(--primary);
  color:var(--primary);
  font-family:var(--font-zh);
  font-size:16px;font-weight:700;
  padding:14px 40px;
  border-radius:var(--radius-pill);
  cursor:pointer;
  transition:var(--transition);
}
.btn-restart:hover{
  background:var(--primary);
  color:var(--bg-deep);
  transform:translateY(-2px);
  box-shadow:0 4px 20px rgba(244,162,97,0.3);
}
.btn-restart svg{width:18px;height:18px;stroke:currentColor}

/* ============================================
   FOOTER
   ============================================ */
.footer{
  text-align:center;
  padding:40px 20px 20px;
  font-size:12px;
  color:var(--text-dim);
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media(max-width:480px){
  .app{padding:16px 12px}
  .question-card{padding:22px 16px}
  .result-card{padding:28px 16px}
  .option-btn{padding:14px 14px;font-size:14px}
  .cat-preview{gap:12px}
  .cat-preview-item img{width:52px;height:52px}
  .btn-start{padding:14px 36px;font-size:16px}
  .result-image{width:140px;height:140px}
}

@media(max-width:360px){
  .cat-preview{grid-template-columns:repeat(2,1fr)}
}

/* Toast */
.toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--success);
  color:var(--bg-deep);
  font-size:14px;font-weight:600;
  padding:10px 24px;
  border-radius:var(--radius-pill);
  opacity:0;
  transition:all 0.3s ease;
  z-index:200;
  pointer-events:none;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* ============================================
   AD MODAL
   ============================================ */
.ad-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:1000;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.35s ease;
}
.ad-overlay.show{
  opacity:1;
  pointer-events:auto;
}

.ad-card{
  position:relative;
  max-width:200px;
  width:50%;
  border-radius:var(--radius-lg);
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(244,162,97,0.1);
  transform:scale(0.85) translateY(30px);
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.35s ease;
  opacity:0;
  background:var(--bg-mid);
}
.ad-overlay.show .ad-card{
  transform:scale(1) translateY(0);
  opacity:1;
}

.ad-card a{
  display:block;
  line-height:0;
}

.ad-card img{
  width:100%;
  height:auto;
  display:block;
  cursor:pointer;
  transition:transform 0.3s ease;
}
.ad-card img:hover{
  transform:scale(1.02);
}

.ad-close{
  position:absolute;
  top:10px;right:10px;
  width:34px;height:34px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:50%;
  color:#fff;
  font-size:18px;
  line-height:34px;
  text-align:center;
  cursor:pointer;
  transition:var(--transition);
  z-index:10;
  display:flex;align-items:center;justify-content:center;
}
.ad-close:hover{
  background:rgba(231,111,81,0.8);
  transform:rotate(90deg);
}

.ad-label{
  position:absolute;
  top:10px;left:10px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(4px);
  color:var(--text-sub);
  font-size:11px;font-weight:600;
  padding:4px 10px;
  border-radius:var(--radius-pill);
  letter-spacing:0.5px;
  z-index:10;
}

</style>

        desc: 'You\'re like an energetic Abyssinian — a non-stop explorer! You\'re endlessly curious about the world and always eager to try something new. Comfort zones feel like prisons to you — challenges are your stage. Your courage and drive inspire everyone around you, reminding them that life is about bravely chasing dreams!'

/* ==============================================
   CAT IMAGE MAP
   ============================================== */
const catImages = {
  A: 'images/british_shorthair.png',
  B: 'images/siamese.png',
  C: 'images/russian_blue.png',
  D: 'images/orange_tabby.png',
  E: 'images/ragdoll.png',
  F: 'images/abyssinian.png'
};

/* ==============================================
   STATE
   ============================================== */
let currentLang = 'zh';
let currentQuestion = 0;
let answers = [];
let scores = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0 };

/* ==============================================
   GTM HELPER
   ============================================== */
window.dataLayer = window.dataLayer || [];
function trackEvent(eventName, params) {
  window.dataLayer.push({
    event: eventName,
    event_category: 'quiz',
    tool_name: 'cat_personality_quiz',
    ...params
  });
}
// backward compat
window.sendGAS = function(label) {
  trackEvent('quiz_interaction', { event_label: label });
};

/* ==============================================
   DOM REFS
   ============================================== */
const $ = id => document.getElementById(id);
const pages = {
  landing: $('page-landing'),
  quiz: $('page-quiz'),
  result: $('page-result')
};

/* ==============================================
   PARTICLES
   ============================================== */
(function initParticles() {
  const container = $('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
    p.style.opacity = 0.15 + Math.random() * 0.3;
    container.appendChild(p);
  }
})();

/* ==============================================
   LANGUAGE
   ============================================== */
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
  updateTexts();
  // re-render current question if on quiz page
  if (pages.quiz.classList.contains('active')) {
    renderQuestion(currentQuestion);
  }
  // re-render result if on result page
  if (pages.result.classList.contains('active')) {
    rerenderResult();
  }
}

function updateTexts() {
  const t = i18n[currentLang];
  $('landing-title').innerHTML = t.landing_title;
  $('landing-subtitle').innerHTML = t.landing_subtitle;
  $('landing-time').textContent = t.landing_time;
  $('start-text').textContent = t.start_text;
  $('back-text').textContent = t.back_text;
  $('share-title').textContent = t.share_title;
  $('copy-text').textContent = t.copy_text;
  $('restart-text').textContent = t.restart_text;
  $('footer-text').innerHTML = t.footer_text;
  // short names
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});

/* ==============================================
   PAGE CONTROL
   ============================================== */
function showPage(name) {
  Object.values(pages).forEach(p => p.classList.remove('active'));
  pages[name].classList.add('active');
  // re-trigger animation
  pages[name].style.animation = 'none';
  void pages[name].offsetHeight;
  pages[name].style.animation = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ==============================================
   QUIZ LOGIC
   ============================================== */
function startQuiz() {
  currentQuestion = 0;
  answers = [];
  scores = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0 };
  showPage('quiz');
  renderQuestion(0);
  trackEvent('quiz_start');
}

function renderQuestion(idx) {
  const t = i18n[currentLang];
  const q = t.questions[idx];
  const total = t.questions.length;

  $('progress-label').textContent = `${idx + 1} / ${total}`;
  $('progress-fill').style.width = ((idx + 1) / total * 100) + '%';
  $('question-number').textContent = idx + 1;
  $('question-text').textContent = q.text;

  // Back button
  $('btn-back').classList.toggle('hidden', idx === 0);

  // Card animation
  const card = $('question-card');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = 'cardIn 0.4s ease-out';

  // Options
  const optContainer = $('options');
  optContainer.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (answers[idx] === i) btn.classList.add('selected');
    btn.innerHTML = `
      <span class="option-letter">${letters[i]}</span>
      <span class="option-text">${opt.text}</span>
    `;
    btn.addEventListener('click', () => selectOption(idx, i, opt.scores));
    optContainer.appendChild(btn);
  });

  // aria
  document.querySelector('.progress-bar').setAttribute('aria-valuenow', Math.round((idx + 1) / total * 100));
}

function selectOption(qIdx, optIdx, optScores) {
  // If they changed answer, undo previous scores
  if (answers[qIdx] !== undefined) {
    const prevScores = i18n[currentLang].questions[qIdx].options[answers[qIdx]].scores;
    for (const [cat, pts] of Object.entries(prevScores)) {
      scores[cat] -= pts;
    }
  }

  // Record new answer
  answers[qIdx] = optIdx;

  // Add new scores
  for (const [cat, pts] of Object.entries(optScores)) {
    scores[cat] += pts;
  }

  // visual feedback
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === optIdx);
  });

  trackEvent('quiz_answer', {
    question_number: qIdx + 1,
    selected_option: optIdx
  });

  // next question or result
  const total = i18n[currentLang].questions.length;
  setTimeout(() => {
    if (qIdx + 1 < total) {
      currentQuestion = qIdx + 1;
      renderQuestion(currentQuestion);
    } else {
      showResult();
    }
  }, 400);
}

function goBack() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion(currentQuestion);
  }
}

function showResult() {
  // Find top cat
  let maxScore = 0;
  let resultCat = 'A';
  for (const [cat, pts] of Object.entries(scores)) {
    if (pts > maxScore) {
      maxScore = pts;
      resultCat = cat;
    }
  }

  const t = i18n[currentLang];
  const r = t.results[resultCat];

  $('result-badge').textContent = t.result_badge;
  $('result-image').src = catImages[resultCat];
  $('result-image').alt = r.name;
  $('result-name').textContent = r.name;
  $('result-subtitle').textContent = r.subtitle;
  $('result-desc').textContent = r.desc;

  // Traits
  const traitsEl = $('result-traits');
  traitsEl.innerHTML = '';
  r.traits.forEach(trait => {
    const tag = document.createElement('span');
    tag.className = 'trait-tag';
    tag.textContent = trait;
    traitsEl.appendChild(tag);
  });

  lastResultCat = resultCat;
  showPage('result');
  trackEvent('quiz_complete', { result_type: resultCat + '_' + r.name });

  // Trigger ad popup after 1.5s delay
  adShown = false;
  setTimeout(() => showAd(), 1500);
}

let lastResultCat = 'A';

function rerenderResult() {
  const t = i18n[currentLang];
  const r = t.results[lastResultCat];
  $('result-badge').textContent = t.result_badge;
  $('result-name').textContent = r.name;
  $('result-subtitle').textContent = r.subtitle;
  $('result-desc').textContent = r.desc;
  const traitsEl = $('result-traits');
  traitsEl.innerHTML = '';
  r.traits.forEach(trait => {
    const tag = document.createElement('span');
    tag.className = 'trait-tag';
    tag.textContent = trait;
    traitsEl.appendChild(tag);
  });
}

function restartQuiz() {
  const prevResult = Object.entries(scores).reduce((a, b) => a[1] > b[1] ? a : b)[0];
  trackEvent('quiz_restart', { previous_result: prevResult });
  adShown = false;
  startQuiz();
}

/* ==============================================
   SHARE
   ============================================== */
function copyLink() {
  const t = i18n[currentLang];
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = $('btn-copy');
    btn.classList.add('copied');
    $('copy-text').textContent = t.copied_text;
    trackEvent('quiz_share', { share_platform: 'copy_link', result_type: $('result-name').textContent });
    setTimeout(() => {
      btn.classList.remove('copied');
      $('copy-text').textContent = t.copy_text;
    }, 2000);
  });
}

function shareFB() {
  const url = encodeURIComponent(window.location.href);
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
  trackEvent('quiz_share', { share_platform: 'facebook', result_type: $('result-name').textContent });
}

function shareLINE() {
  const t = i18n[currentLang];
  const resultName = $('result-name').textContent;
  const msg = encodeURIComponent(`${t.landing_title} - ${t.result_badge}: ${resultName}\n${window.location.href}`);
  window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(window.location.href)}&text=${msg}`, '_blank');
  trackEvent('quiz_share', { share_platform: 'line', result_type: resultName });
}

/* ==============================================
   EVENT BINDINGS
   ============================================== */
$('btn-start').addEventListener('click', startQuiz);
$('btn-back').addEventListener('click', goBack);
$('btn-restart').addEventListener('click', restartQuiz);
$('btn-copy').addEventListener('click', copyLink);
$('btn-fb').addEventListener('click', shareFB);
$('btn-line').addEventListener('click', shareLINE);

/* ==============================================
   AD POPUP SYSTEM + UTM TRACKING
   ============================================== */

// --- UTM Configuration ---
const UTM_SOURCE = 'whatcatareyou';
const UTM_MEDIUM = 'display';
const UTM_CAMPAIGN = 'mega_traffic_2026';
const ordinals = ['1st','2nd','3rd','4th','5th','6th','7th','8th','9th','10th'];

function buildUtmUrl(baseUrl, bannerIndex) {
  const sep = baseUrl.includes('?') ? '&' : '?';
  const content = (ordinals[bannerIndex] || (bannerIndex + 1) + 'th') + '_banner';
  return `${baseUrl}${sep}utm_source=${UTM_SOURCE}&utm_medium=${UTM_MEDIUM}&utm_campaign=${UTM_CAMPAIGN}&utm_content=${content}`;
}

// --- Ad List ---
const adList = [
  { id: 'cmj2',    img: 'images/pic_cmj2.png',    url: 'https://cmj2.com.tw/' },
  { id: 'iStar31', img: 'images/pic_iStar31.png',  url: 'https://www.gametower.com.tw/Games/FreePlay/Mj/star31/' },
  { id: 'pg',      img: 'images/pic_pg.png',        url: 'https://www.gametower.com.tw/Games/PG/' }
];

let adShown = false;
let currentAd = null;
let currentAdIndex = 0;

function showAd() {
  if (adShown) return;
  adShown = true;

  // Random pick
  currentAdIndex = Math.floor(Math.random() * adList.length);
  currentAd = adList[currentAdIndex];
  const utmUrl = buildUtmUrl(currentAd.url, currentAdIndex);

  $('ad-image').src = currentAd.img;
  $('ad-image').alt = currentAd.id + ' advertisement';
  $('ad-link').href = utmUrl;
  $('ad-overlay').classList.add('show');

  // Focus close button for accessibility
  setTimeout(() => $('ad-close').focus(), 400);

  trackEvent('ad_impression', {
    ad_id: currentAd.id,
    utm_source: UTM_SOURCE,
    utm_content: ordinals[currentAdIndex] + '_banner'
  });
}

function closeAd(method) {
  $('ad-overlay').classList.remove('show');
  if (currentAd) {
    trackEvent('ad_close', { ad_id: currentAd.id, close_method: method });
  }
  // Return focus to restart button
  setTimeout(() => $('btn-restart').focus(), 350);
}

// Ad click tracking
$('ad-link').addEventListener('click', function() {
  if (currentAd) {
    trackEvent('ad_click', {
      ad_id: currentAd.id,
      ad_url: $('ad-link').href,
      utm_source: UTM_SOURCE,
      utm_content: ordinals[currentAdIndex] + '_banner'
    });
  }
});

// Close via X button
$('ad-close').addEventListener('click', function(e) {
  e.stopPropagation();
  closeAd('button');
});

// Close via overlay click
$('ad-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeAd('overlay');
});

// Close via Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && $('ad-overlay').classList.contains('show')) {
    closeAd('escape');
  }
});

// Initialize
updateTexts();
</script>
